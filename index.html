<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#000;
overflow:hidden;
color:white;
}

/* Animated luxury gradient background */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle at 20% 30%, #ff0000 0%, transparent 40%),
radial-gradient(circle at 80% 70%, #8b0000 0%, transparent 40%),
#000;
animation:moveBg 15s infinite alternate ease-in-out;
z-index:-2;
}

@keyframes moveBg{
0%{transform:translate(0,0);}
100%{transform:translate(-10%, -10%);}
}

/* Glass Card */
.card{
width:90%;
max-width:430px;
padding:50px 40px;
border-radius:28px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 40px 80px rgba(0,0,0,0.8);
text-align:center;
animation:fadeUp 1.2s ease;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

.logo{
width:110px;
height:110px;
border-radius:20px;
object-fit:cover;
margin-bottom:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
transition:0.4s ease;
}

.logo:hover{
transform:scale(1.07);
}

.title{
font-size:40px;
font-weight:800;
letter-spacing:2px;
background:linear-gradient(90deg,#ff0000,#ff4d4d,#ff0000);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
margin-top:10px;
font-size:13px;
letter-spacing:3px;
color:#aaa;
}

.features{
margin-top:35px;
font-size:16px;
color:#ddd;
line-height:32px;
}

.btn{
margin-top:40px;
display:inline-block;
padding:16px 35px;
border-radius:12px;
background:linear-gradient(90deg,#e50914,#b20710);
color:white;
font-weight:600;
letter-spacing:2px;
text-decoration:none;
transition:0.3s ease;
position:relative;
overflow:hidden;
}

.btn::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:rgba(255,255,255,0.2);
transition:0.4s;
}

.btn:hover::after{
left:100%;
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 15px 40px rgba(229,9,20,0.5);
}

.footer{
margin-top:25px;
font-size:12px;
color:#777;
}

#redirectText{
margin-top:15px;
font-size:13px;
color:#ff4d4d;

⚡ Instant Access<br>
🔥 High Quality Content
</div>

<a href="https://t.me/+3AbRkwiTE3w2OWY1" target="_blank" class="btn">
JOIN NOW
</a>

<div class="footer">
Private • Secure • Limited Entry
</div>

<p id="redirectText"></p>

</div>

<script>
let sec = 25;
let timer = setInterval(()=>{
document.getElementById("redirectText").innerText = "Redirecting in "+sec+" seconds...";
sec--;
if(sec<0){
clearInterval(timer);
window.location.href="https://t.me/+3AbRkwiTE3w2OWY1";

},1000);
</script>
