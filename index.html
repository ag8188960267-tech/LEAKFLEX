<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0a0a0a;
overflow:hidden;
color:white;
position:relative;
}

/* Ultra premium animated background */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle at 20% 30%, #ffd700 0%, transparent 40%),
radial-gradient(circle at 80% 70%, #ff4d00 0%, transparent 40%),
#0a0a0a;
animation:moveBg 20s infinite alternate ease-in-out;
z-index:-2;
}

@keyframes moveBg{
0%{transform:translate(0,0);}
100%{transform:translate(-10%, -10%);}
}

/* Card with glowing border & VIP badge */
.card{
width:90%;
max-width:460px;
padding:55px 40px;
border-radius:32px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(35px);
border:2px solid rgba(255,215,0,0.8);
box-shadow:0 0 25px #ffd700, 0 20px 80px rgba(0,0,0,0.9);
text-align:center;
position:relative;
overflow:hidden;
}

.card::before{
content:"VIP";
position:absolute;
top:-10px;
right:-10px;
padding:10px 25px;
background:linear-gradient(45deg,#ffd700,#ff8c00);
color:black;
font-weight:800;
font-size:14px;
border-radius:20px;
transform:rotate(15deg);
box-shadow:0 0 20px #ffd700;
z-index:2;
}

.card::after{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:conic-gradient(from 0deg, #ffd700,#ff4d00,#ffd700,#ff4d00);
opacity:0.08;
animation:rotateBG 10s linear infinite;
border-radius:50%;
z-index:-1;
}

@keyframes rotateBG{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

.card{animation:fadeUp 1.2s ease;}

.title{
font-size:44px;
font-weight:900;
letter-spacing:2px;
background:linear-gradient(90deg,#ffd700,#ff4d00,#ffd700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 12px #ffd700, 0 0 20px #ff4d00;
}

.subtitle{
margin-top:10px;
font-size:14px;
letter-spacing:3px;
color:#ccc;
}

.features{
margin-top:35px;
font-size:16px;
color:#eee;
line-height:36px;
text-align:left;
}

.features span{
color:#ffd700;
font-weight:700;
}

.btn{
margin-top:45px;
display:inline-block;
padding:18px 42px;
border-radius:16px;
background:linear-gradient(90deg,#ff4d00,#ffd700,#ff4d00);
color:black;
font-weight:800;
letter-spacing:2px;
text-decoration:none;
transition:0.3s ease;
position:relative;
overflow:hidden;
box-shadow:0 0 20px #ffd700, 0 8px 30px rgba(255,77,0,0.6);
}

.btn::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:rgba(255,255,255,0.2);
transition:0.4s;
}

.btn:hover::after{
left:100%;
}

.btn:hover{
transform:translateY(-4px) scale(1.03);
box-shadow:0 0 30px #ffd700, 0 10px 40px rgba(255,77,0,0.7);
}

.footer{
margin-top:28px;
font-size:12px;
color:#aaa;
}

#redirectText{
margin-top:18px;
font-size:14px;
color:#ffd700;
}
</style>
</head>

<body>

<div class="card">

<div class="title">CRICKET ELITE VIP 🏏</div>
<div class="subtitle">EXCLUSIVE PREMIUM TIPPING CHANNEL</div>

<div class="features">
<span>🎯 Precision Pre-Match Analysis</span><br>
<span>💰 Daily Profit Tips & Predictions</span><br>
<span>📊 Live Match Reports</span><br>
<span>🔥 Real-time Score Alerts</span><br>
<span>🏆 VIP Members Only Access</span>
</div>

<a href="https://t.me/+3AbRkwiTE3w2OWY1" target="_blank" class="btn">
JOIN ELITE VIP
</a>

<div class="footer">
Secure • Trusted • Limited Slots
</div>

<p id="redirectText"></p>

</div>

<script>
let sec = 20;
let timer = setInterval(()=>{
document.getElementById("redirectText").innerText = "Redirecting in "+sec+" seconds...";
sec--;
if(sec<0){
clearInterval(timer);
window.location.href="https://t.me/+3AbRkwiTE3w2OWY1";
}
},1000);
</script>

</body>
</html>
